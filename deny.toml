# cargo-deny configuration for the knot workspace.

[graph]
all-features = true

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
    # tokio-tar reachable only via testcontainers (dev-deps); not in
    # production runtime. The crate is archived; no fix available.
    # See: RUSTSEC-2025-0111
    { id = "RUSTSEC-2025-0111", reason = "tokio-tar via testcontainers dev-deps; no production exposure" },
    { id = "RUSTSEC-2025-0134", reason = "rustls-pemfile unmaintained; transitive via testcontainers/bollard; superseded by rustls-pki-types in newer chains" },
]

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unlicense",
    "Zlib",
    "CC0-1.0",
    "Unicode-3.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",  # webpki-roots; permissive, LF-approved
]
confidence-threshold = 0.93

[[licenses.exceptions]]
# ring uses a custom not-quite-OpenSSL license; accept as a known exception.
name = "ring"
allow = ["OpenSSL", "ISC", "MIT"]

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true  # path = "../..." workspace internals
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
