name: Helm chart CI

on:
  pull_request:
    paths:
      - "deploy/helm/**"
      - ".github/workflows/helm-ci.yaml"
  push:
    branches: [main, master]
    paths:
      - "deploy/helm/**"

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.7.0

      - name: ct lint
        run: ct lint --target-branch main --chart-dirs deploy/helm

      - name: Create kind cluster
        uses: helm/kind-action@v1.10.0
        with:
          version: v0.24.0
          wait: 60s

      - name: Seed CI values
        run: |
          mkdir -p deploy/helm/knot/ci
          cat > deploy/helm/knot/ci/test-values.yaml <<EOF
          database:
            url: "postgres://knot:knot@127.0.0.1:5432/knot"
          session:
            key: "test-key-32-bytes-aaaaaaaaaaaaaa"
          migrations:
            enabled: false
          probes:
            enabled: false
          EOF

      - name: ct install
        run: ct install --target-branch main --chart-dirs deploy/helm
